name: CI

on:
  push:
    branches: [main, demo/public-safe-baseline, feat/apple-grade-professionalization, feat/origin-bridge, feat/synthetic-cv-eval-report]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install dependencies
        working-directory: backend/flask_api
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend/flask_api
        run: python3 -m pytest -q

      - name: Schema contract check
        run: python3 scripts/schema_contract_check.py

      - name: Mobile skeleton check
        run: python3 scripts/mobile_skeleton_check.py

      - name: Origin bridge check
        run: python3 scripts/origin_bridge_check.py

      - name: Synthetic visual evaluation
        run: |
          python3 ml/augmentation/generate_synthetic_placeholders.py
          python3 ml/evaluation/evaluate_triage.py

      - name: Synthetic CV report check
        run: python3 scripts/synthetic_cv_report_check.py

      - name: Public safety scan
        run: python3 scripts/public_safety_scan.py
